        // Central Application Engine Properties
        let currentMode = 'training'; 
        let currentQuestionIndex = 0;
        let userAnswers = {}; 
        let isReviewed = false;

        // Countdowns Timer Tracking Metrics
        let timeRemaining = 50 * 60; // 50 Minutes converted to absolute seconds tracking
        let timerIntervalId = null;

        // Core Document Elements Hook Variables
        const setupScreen = document.getElementById('setup-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultsScreen = document.getElementById('results-screen');
        const startBtn = document.getElementById('start-btn');
        const prevBtn = document.getElementById('prev-btn');
        const actionBtn = document.getElementById('action-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const modeBadge = document.getElementById('mode-badge');
        const questionContainer = document.getElementById('question-container');
        const explanationBox = document.getElementById('explanation-box');
        const feedbackIcon = document.getElementById('feedback-icon');
        const explanationTitle = document.getElementById('explanation-title');
        const explanationText = document.getElementById('explanation-text');
        const scorePercentage = document.getElementById('score-percentage');
        const scoreFraction = document.getElementById('score-fraction');
        const reviewBtn = document.getElementById('review-btn');
        const restartBtn = document.getElementById('restart-btn');
        const timerContainer = document.getElementById('timer-container');
        const timerDisplay = document.getElementById('timer-display');

        // Functional Entry Declarations
        startBtn.addEventListener('click', initQuizSession);
        prevBtn.addEventListener('click', loadPreviousQuestion);
        actionBtn.addEventListener('click', handleActionButtonAction);
        reviewBtn.addEventListener('click', startReviewMode);
        restartBtn.addEventListener('click', resetQuizEnvironment);

        function initQuizSession() {
            const selectedMode = document.querySelector('input[name="mode-select"]:checked').value;
            currentMode = selectedMode;
            userAnswers = {};
            currentQuestionIndex = 0;
            isReviewed = false;
            clearInterval(timerIntervalId);

            // Interface Toggle Adjustments
            modeBadge.textContent = currentMode === 'training' ? 'Training Mode' : 'Testing Mode';
            modeBadge.className = currentMode === 'training' 
                ? 'px-3 py-1 rounded-full font-semibold bg-emerald-500 text-white text-xs' 
                : 'px-3 py-1 rounded-full font-semibold bg-blue-600 text-white text-xs';

            setupScreen.classList.add('hidden');
            resultsScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            document.getElementById('quiz-status-bar').classList.remove('hidden');

            if (currentMode === 'testing') {
                timerContainer.classList.remove('hidden');
                timeRemaining = 50 * 60; // 50 Minutes set limit reset parameter
                updateTimerDisplay();
                timerIntervalId = setInterval(countdownTick, 1000);
            } else {
                timerContainer.classList.add('hidden');
            }

            renderQuestion();
        }

        function countdownTick() {
            if (timeRemaining > 0) {
                timeRemaining--;
                updateTimerDisplay();
            } else {
                clearInterval(timerIntervalId);
                alert("Testing timeline completed! Grading input configurations now.");
                saveCurrentInputs();
                processQuizSubmission(true); // Forced exit trigger parameter
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function renderQuestion() {
            explanationBox.classList.add('hidden');
            const q = quizData[currentQuestionIndex];
            
            prevBtn.classList.toggle('invisible', currentQuestionIndex === 0);
            
            // Text adjustments based on test states
            if (currentMode === 'testing' && currentQuestionIndex === quizData.length - 1) {
                actionBtn.textContent = 'Submit Quiz';
                actionBtn.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors shadow-sm ml-auto";
            } else if (currentMode === 'training') {
                actionBtn.textContent = 'Verify & Next';
                actionBtn.className = "bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors shadow-sm ml-auto";
            } else {
                actionBtn.textContent = 'Next';
                actionBtn.className = "bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors shadow-sm ml-auto";
            }

            if (isReviewed) {
                actionBtn.textContent = currentQuestionIndex === quizData.length - 1 ? 'Finish Review' : 'Next';
            }

            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            progressBar.style.width = `${progressPercent}%`;
            progressText.textContent = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;

            let html = `
                <div class="mb-2 text-xs font-bold text-blue-600 uppercase tracking-widest">${q.topic}</div>
                <h3 class="text-lg font-bold text-slate-900 mb-6 leading-snug">${q.question}</h3>
                <div class="space-y-3">
            `;

            if (q.type === 'single' || q.type === 'multiple') {
                q.options.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    const isChecked = userAnswers[currentQuestionIndex]?.includes(idx);
                    const inputType = q.type === 'single' ? 'radio' : 'checkbox';
                    
                    html += `
                        <label class="flex items-start gap-4 border border-slate-200 rounded-xl p-4 cursor-pointer hover:bg-slate-50 hover:border-slate-300 transition-all relative group option-wrapper" data-idx="${idx}">
                            <input type="${inputType}" name="quiz-opt" value="${idx}" ${isChecked ? 'checked' : ''} ${isReviewed ? 'disabled' : ''} class="mt-1 text-blue-600 focus:ring-blue-500 rounded border-slate-300 h-4 w-4">
                            <div class="text-sm">
                                <span class="font-bold text-slate-900 mr-1">${letter}.</span> 
                                <span class="text-slate-700 font-medium">${opt}</span>
                            </div>
                        </label>
                    `;
                });
            } else if (q.type === 'matrix' || q.type === 'matching') {
                html += `<div class="overflow-x-auto custom-scrollbar"><table class="w-full text-left text-sm border-collapse min-w-[420px]"><thead><tr class="border-b border-slate-200"><th class="py-2 text-slate-500 font-semibold max-w-sm">Scenario Targets</th><th class="py-2 text-slate-500 font-semibold w-52 text-right">Parameter Matches</th></tr></thead><tbody class="divide-y divide-slate-100">`;
                
                q.subquestions.forEach((subQ, subIdx) => {
                    const savedVal = userAnswers[currentQuestionIndex]?.[subIdx];
                    html += `
                        <tr class="matrix-row" data-subidx="${subIdx}">
                            <td class="py-3.5 pr-4 text-slate-800 font-medium leading-normal">${subQ}</td>
                            <td class="py-3.5 text-right">
                                <select ${isReviewed ? 'disabled' : ''} class="matrix-select bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2 w-full max-w-[200px] font-medium shadow-sm">
                                    <option value="-1" ${savedVal === undefined || savedVal === -1 ? 'selected' : ''}>-- Select Match --</option>
                                    ${q.options.map((opt, optIdx) => `<option value="${optIdx}" ${savedVal === optIdx ? 'selected' : ''}>${opt}</option>`).join('')}
                                </select>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
            }

            html += `</div>`;
            questionContainer.innerHTML = html;

            if (isReviewed || (currentMode === 'training' && userAnswers[currentQuestionIndex] !== undefined)) {
                evaluateAndDisplayExplanation();
            }
        }

        function saveCurrentInputs() {
            const q = quizData[currentQuestionIndex];
            if (q.type === 'single') {
                const selected = document.querySelector('input[name="quiz-opt"]:checked');
                if (selected) userAnswers[currentQuestionIndex] = [parseInt(selected.value)];
            } else if (q.type === 'multiple') {
                const checkedArr = Array.from(document.querySelectorAll('input[name="quiz-opt"]:checked')).map(el => parseInt(el.value));
                if (checkedArr.length > 0) userAnswers[currentQuestionIndex] = checkedArr;
            } else if (q.type === 'matrix' || q.type === 'matching') {
                const rowSelects = document.querySelectorAll('.matrix-select');
                let answers = [];
                rowSelects.forEach((select) => {
                    answers.push(parseInt(select.value));
                });
                if(answers.some(v => v !== -1)) {
                    userAnswers[currentQuestionIndex] = answers;
                }
            }
        }

        function handleActionButtonAction() {
            if (isReviewed) {
                if (currentQuestionIndex < quizData.length - 1) {
                    currentQuestionIndex++;
                    renderQuestion();
                } else {
                    exitReviewMode();
                }
                return;
            }

            if (!isReviewed) saveCurrentInputs();

            if (currentMode === 'training') {
                const hasAnswered = userAnswers[currentQuestionIndex] !== undefined;
                if (!hasAnswered) {
                    alert("Please provide an answer choice parameter to continue.");
                    return;
                }

                const isBoxVisible = !explanationBox.classList.contains('hidden');
                if (!isBoxVisible) {
                    evaluateAndDisplayExplanation();
                    actionBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Finish and Score" : "Next Question";
                    actionBtn.className = "bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 px-6 rounded-xl transition-colors shadow-sm ml-auto";
                    return;
                }
            }

            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                processQuizSubmission();
            }
        }
        function loadPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                // Save current work before going backward unless we are just reviewing
                if (!isReviewed) saveCurrentInputs();
                currentQuestionIndex--;
                renderQuestion();
            }
        }
        function evaluateAndDisplayExplanation() {
            const q = quizData[currentQuestionIndex];
            const uAns = userAnswers[currentQuestionIndex];
            let isCorrect = false;

            if (q.type === 'single' || q.type === 'multiple') {
                const targetOptions = document.querySelectorAll('.option-wrapper');
                const sortedExpected = [...q.answer].sort().toString();
                const sortedUser = uAns ? [...uAns].sort().toString() : "";
                isCorrect = sortedExpected === sortedUser;

                targetOptions.forEach((element) => {
                    const idx = parseInt(element.getAttribute('data-idx'));
                    const isExpected = q.answer.includes(idx);
                    const isSelected = uAns?.includes(idx);

                    if (isExpected) {
                        element.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-900');
                    } else if (isSelected && !isExpected) {
                        element.classList.add('bg-rose-50', 'border-rose-400', 'text-rose-900');
                    }
                });
            } else if (q.type === 'matrix' || q.type === 'matching') {
                const selectElements = document.querySelectorAll('.matrix-select');
                let correctCount = 0;
                
                q.subquestions.forEach((_, subIdx) => {
                    const uVal = uAns ? uAns[subIdx] : -1;
                    const expectedVal = q.answer[subIdx];
                    const selectEl = selectElements[subIdx];

                    if (uVal === expectedVal) {
                        correctCount++;
                        if (selectEl) selectEl.classList.add('bg-emerald-100', 'border-emerald-500', 'text-emerald-900');
                    } else {
                        if (selectEl) selectEl.classList.add('bg-rose-100', 'border-rose-400', 'text-rose-900');
                    }
                });
                isCorrect = correctCount === q.subquestions.length;
            }

            explanationBox.classList.remove('hidden');
            if (isCorrect) {
                feedbackIcon.innerHTML = `<div class="bg-emerald-500 text-white p-1 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg></div>`;
                explanationTitle.textContent = "Correct Answer Matrix Match";
                explanationTitle.className = "font-bold text-sm text-emerald-800";
            } else {
                feedbackIcon.innerHTML = `<div class="bg-rose-500 text-white p-1 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg></div>`;
                explanationTitle.textContent = "Incorrect Target Configuration";
                explanationTitle.className = "font-bold text-sm text-rose-800";
            }
            explanationText.textContent = q.explanation;
        }

        function processQuizSubmission(forcedTimeOut = false) {
            clearInterval(timerIntervalId);
            let coreScore = 0;

            quizData.forEach((q, idx) => {
                const uAns = userAnswers[idx];
                if (!uAns) return;

                if (q.type === 'single' || q.type === 'multiple') {
                    if ([...q.answer].sort().toString() === [...uAns].sort().toString()) coreScore++;
                } else if (q.type === 'matrix' || q.type === 'matching') {
                    let allRowsMatch = true;
                    q.subquestions.forEach((_, sIdx) => {
                        if (uAns[sIdx] !== q.answer[sIdx]) allRowsMatch = false;
                    });
                    if (allRowsMatch) coreScore++;
                }
            });

            const percentMetric = Math.round((coreScore / quizData.length) * 100);
            scorePercentage.textContent = `${percentMetric}%`;
            scoreFraction.textContent = `${coreScore} out of ${quizData.length} items evaluated correctly`;

            if (percentMetric >= 70) {
                scorePercentage.className = "text-5xl font-black text-emerald-600";
                resultsHeadline.textContent = "Assessment Passed!";
                resultsIconFrame.className = "inline-flex items-center justify-center w-20 h-20 bg-emerald-50 rounded-full mb-4 text-emerald-600";
                resultsIconFrame.innerHTML = `<svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else {
                scorePercentage.className = "text-5xl font-black text-rose-600";
                resultsHeadline.textContent = "Review Required";
                resultsIconFrame.className = "inline-flex items-center justify-center w-20 h-20 bg-rose-50 rounded-full mb-4 text-rose-600";
                resultsIconFrame.innerHTML = `<svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            }

            if(forcedTimeOut) {
                resultsSubtext.textContent = "Exam terminated because session tracking limits timed out.";
            } else {
                resultsSubtext.textContent = "All answers evaluated against current Certiport testing profiles standard metrics.";
            }

            quizScreen.classList.add('hidden');
            document.getElementById('quiz-status-bar').classList.add('hidden');
            resultsScreen.classList.remove('hidden');
        }

        function startReviewMode() {
            isReviewed = true;
            currentQuestionIndex = 0;
            resultsScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            document.getElementById('quiz-status-bar').classList.remove('hidden');
            renderQuestion();
        }

        function exitReviewMode() {
            isReviewed = false;
            quizScreen.classList.add('hidden');
            document.getElementById('quiz-status-bar').classList.add('hidden');
            resultsScreen.classList.remove('hidden');
        }

        function resetQuizEnvironment() {
            userAnswers = {};
            currentQuestionIndex = 0;
            isReviewed = false;
            clearInterval(timerIntervalId);
            resultsScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
